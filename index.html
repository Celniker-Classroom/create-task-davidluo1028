<!--
================================================================================
TITLE: Modern Pong 

PROJECT DESCRIPTION:
Modern Pong is a contemporary reimagining of the classic arcade game "Pong."
This project focuses on delivering a sleek, user-friendly interface that blends
nostalgia with modern design aesthetics. While the original Pong game featured
simple black-and-white visuals, this modern version introduces a refined visual
experience using a calming color palette centered around shades of blue,
including baby blue, light blue, and dark navy tones.

================================================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pong</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Modern Pong</h1>
</header>

<div class="container">

    <div class="scoreboard">
        <div class="player">
            <h2>Player 1</h2>
            <div class="score" id="score1">0</div>
        </div>
        <div class="player">
            <h2>Player 2</h2>
            <div class="score" id="score2">0</div>
        </div>
    </div>

    <div class="mode-switcher">
        <button id="regularModeBtn">Regular Mode</button>
    </div>

    <div class="game-container">
        <div class="game-area" id="gameArea">
            <div class="center-line"></div>
            <div class="paddle left" id="paddleLeft"></div>
            <div class="paddle right" id="paddleRight"></div>
            <div class="ball" id="ball"></div>
        </div>

        <div class="difficulty-panel" id="difficultyPanel">
            <button class="back-btn" id="backToRegularBtn">Back to Regular Mode</button>
            <h3>Difficulty</h3>
            <button class="diff-btn" id="easyBtn">Easy</button>
            <button class="diff-btn" id="mediumBtn">Medium</button>
            <button class="diff-btn" id="hardBtn">Hard</button>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">Start Game</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
        <div class="modes-container">
            <button id="moreModesBtn">More Modes</button>
            <div class="modes-box" id="modesBox">
                <button class="mode-btn" id="vsAiBtn">VS AI</button>
            </div>
        </div>
    </div>

    <div class="instructions">
        <h3>How to Play</h3>
        <p id="instructionsText">
            Use <strong>W</strong> and <strong>S</strong> keys (or <strong>Up/Down</strong> arrows) to move your paddle.
            Beat the AI by scoring more points!
        </p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
