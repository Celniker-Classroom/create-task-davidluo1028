<!--
================================================================================
TITLE: Modern Pong 

PROJECT DESCRIPTION:
Modern Pong is a contemporary reimagining of the classic arcade game "Pong."
This project focuses on delivering a sleek, user-friendly interface that blends
nostalgia with modern design aesthetics. While the original Pong game featured
simple black-and-white visuals, this modern version introduces a refined visual
experience using a calming color palette centered around shades of blue,
including baby blue, light blue, and dark navy tones.

The purpose of this stage of the project is to establish a clean and organized
wireframe using HTML and CSS. The layout is designed to support future
JavaScript integration, which will handle gameplay mechanics such as paddle
movement, ball physics, collision detection, scoring, and game state management.
================================================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pong</title>
    <!-- Link to External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Modern Pong</h1>
    </header>

    <!-- Main Content -->
    <div class="container">

        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="player">
                <h2>Player 1</h2>
                <div class="score" id="score1">0</div>
            </div>
            <div class="player">
                <h2>Player 2</h2>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <!-- Game Arena -->
        <div class="game-area" id="gameArea">
            <div class="center-line"></div>
            <div class="paddle left" id="paddleLeft"></div>
            <div class="paddle right" id="paddleRight"></div>
            <div class="ball" id="ball"></div>
        </div>

        <!-- Control Buttons -->
        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
            <button id="settingsBtn">Settings</button>
        </div>

        <!-- Instructions -->
        <div class="instructions">
            <h3>How to Play</h3>
            <p>
                Player 1 uses the <strong>W</strong> and <strong>S</strong> keys to move,
                while Player 2 uses the <strong>Up</strong> and <strong>Down</strong>
                arrow keys. The objective is to prevent the ball from passing your
                paddle while attempting to score against your opponent.
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        © 2026 Modern Pong 
    </footer>

</body>
</html>
